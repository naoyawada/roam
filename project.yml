name: Roam
options:
  bundleIdPrefix: com.naoyawada
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Roam:
    type: application
    platform: iOS
    sources:
      - path: Roam
    configFiles:
      Debug: Config/BuildNumber.xcconfig
      Release: Config/BuildNumber.xcconfig
    settings:
      base:
        INFOPLIST_FILE: Roam/Info.plist
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.naoyawada.roam
        MARKETING_VERSION_BASE: "1.0"

  RoamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoamTests
    dependencies:
      - target: Roam
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Roam.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Roam"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Roam:
    build:
      preActions:
        - script: |
            cd "${PROJECT_DIR}"
            BUILD_NUMBER=$(git rev-list --count HEAD)
            echo "CURRENT_PROJECT_VERSION = ${BUILD_NUMBER}" > Config/BuildNumber.xcconfig
            echo "MARKETING_VERSION = ${MARKETING_VERSION_BASE}.${BUILD_NUMBER}" >> Config/BuildNumber.xcconfig
          name: Set Build Number from Git
          settingsTarget: Roam
      targets:
        Roam: all
    test:
      targets:
        - RoamTests
